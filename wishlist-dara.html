<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wishlist Buat Razan — Dari Dara 🤍</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#faf6f0;--warm:#f5ede0;--blush:#e8c4b0;
    --rose:#c17a6f;--deep:#7a3f35;--ink:#2d1f1a;
    --gold:#c9a96e;--muted:#9a8070;--sage:#b5c4b1;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--cream);font-family:'Poppins',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;
    background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(232,196,176,.3) 0%,transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 80%,rgba(193,122,111,.15) 0%,transparent 70%);
    pointer-events:none;z-index:0}
  .page{max-width:480px;margin:0 auto;padding:0 1.25rem 5rem;position:relative;z-index:1}

  /* HEADER */
  .header{text-align:center;padding:2rem 0 1.5rem}
  .header-icon{font-size:3rem;display:block;margin-bottom:.85rem;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .header-label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:.4rem}
  .header-title{font-size:clamp(1.4rem,5vw,1.9rem);font-weight:700;color:var(--ink);margin-bottom:.25rem}
  .header-title span{color:var(--rose)}
  .header-sub{font-size:12px;color:var(--muted);line-height:1.65;max-width:300px;margin:.25rem auto 0}

  /* DIVIDER */
  .divider{width:40px;height:1px;background:linear-gradient(to right,transparent,var(--blush),transparent);margin:1.25rem auto}

  /* ADD FORM */
  .add-section{background:#fff;border:1px solid rgba(193,122,111,.15);border-radius:20px;
    padding:1.25rem;margin-bottom:1.25rem;box-shadow:0 2px 12px rgba(193,122,111,.07)}

  .add-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);
    display:block;margin-bottom:.75rem}

  .category-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem}
  .cat-btn{
    display:flex;align-items:center;gap:.3rem;
    border:1.5px solid var(--blush);border-radius:50px;
    padding:.35rem .75rem;background:#fff;
    font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;
    color:var(--muted);cursor:pointer;transition:all .15s;
  }
  .cat-btn:active{transform:scale(.95)}
  .cat-btn.active{background:var(--rose);color:#fff;border-color:var(--rose)}

  .wish-input{
    width:100%;padding:.8rem 1rem;border:1.5px solid var(--blush);border-radius:14px;
    background:var(--cream);font-family:'Poppins',sans-serif;
    font-size:14px;font-weight:400;color:var(--ink);
    resize:none;outline:none;transition:border-color .2s;line-height:1.6;
    margin-bottom:.75rem;
  }
  .wish-input:focus{border-color:var(--rose)}
  .wish-input::placeholder{color:var(--muted);font-weight:300}

  .priority-row{display:flex;gap:.5rem;margin-bottom:.85rem;align-items:center}
  .priority-label{font-size:11px;color:var(--muted);flex-shrink:0}
  .star-btn{font-size:1.2rem;cursor:pointer;opacity:.3;transition:opacity .15s;background:none;border:none;padding:0}
  .star-btn.active{opacity:1}

  .add-btn{
    width:100%;padding:.85rem;border-radius:50px;border:none;cursor:pointer;
    font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;
    background:var(--rose);color:#fff;
    box-shadow:0 4px 16px rgba(193,122,111,.35);transition:all .2s;
  }
  .add-btn:active{background:var(--deep);transform:scale(.97)}
  .add-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

  /* WISHLIST */
  .list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
  .list-title{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
  .list-count{font-size:12px;color:var(--muted)}
  .list-count span{color:var(--rose);font-weight:700}

  /* Filter tabs */
  .filter-row{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.4rem;margin-bottom:.85rem;
    scrollbar-width:none}
  .filter-row::-webkit-scrollbar{display:none}
  .filter-btn{
    flex-shrink:0;padding:.3rem .85rem;border-radius:50px;
    border:1.5px solid var(--blush);background:#fff;
    font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;
    color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .filter-btn.active{background:var(--rose);color:#fff;border-color:var(--rose)}

  /* Wish items */
  .wish-list{display:flex;flex-direction:column;gap:.6rem}

  .wish-item{
    background:#fff;border:1px solid rgba(193,122,111,.12);border-radius:16px;
    padding:1rem 1.1rem;display:flex;align-items:flex-start;gap:.85rem;
    box-shadow:0 2px 8px rgba(193,122,111,.06);
    transition:all .2s;position:relative;overflow:hidden;
  }
  .wish-item::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
    background:var(--blush);border-radius:3px 0 0 3px;
    transition:background .2s;
  }
  .wish-item.done{opacity:.55}
  .wish-item.done::before{background:var(--sage)}

  .wish-check{
    width:22px;height:22px;border-radius:50%;border:2px solid var(--blush);
    background:#fff;cursor:pointer;flex-shrink:0;margin-top:.1rem;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;font-size:.7rem;
  }
  .wish-item.done .wish-check{background:var(--sage);border-color:var(--sage);color:#fff}

  .wish-body{flex:1;min-width:0}
  .wish-cat-badge{
    display:inline-flex;align-items:center;gap:.25rem;
    font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);margin-bottom:.3rem;
  }
  .wish-text{font-size:13px;color:var(--ink);line-height:1.55;font-weight:400;word-break:break-word}
  .wish-item.done .wish-text{text-decoration:line-through;color:var(--muted)}
  .wish-stars{font-size:.7rem;margin-top:.25rem;opacity:.7}
  .wish-date{font-size:10px;color:var(--muted);margin-top:.2rem;display:block}

  .wish-del{
    width:24px;height:24px;border-radius:50%;border:none;background:rgba(193,122,111,.1);
    color:var(--muted);font-size:.75rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:all .15s;
  }
  .wish-del:active{background:rgba(193,122,111,.25);color:var(--rose)}

  /* Empty state */
  .empty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
  .empty-icon{font-size:2.5rem;display:block;margin-bottom:.75rem;opacity:.5}
  .empty-text{font-size:13px;line-height:1.7}

  /* SEND BUTTON */
  .send-section{margin-top:1.5rem}
  .send-hint{font-size:11px;color:var(--muted);text-align:center;margin-bottom:.75rem;line-height:1.6}
  .send-btn{
    width:100%;padding:.9rem;border-radius:50px;border:none;cursor:pointer;
    font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;
    background:linear-gradient(135deg,#25d366,#128c4a);color:#fff;
    box-shadow:0 4px 16px rgba(37,211,102,.3);transition:all .2s;
    display:flex;align-items:center;justify-content:center;gap:.5rem;
  }
  .send-btn:active{transform:scale(.97);opacity:.9}
  .send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

  /* TOAST */
  .toast{position:fixed;top:1.25rem;left:50%;transform:translateX(-50%);
    background:#fff;border:1px solid rgba(193,122,111,.2);
    border-radius:50px;padding:.5rem 1.25rem;
    font-size:12px;font-weight:500;color:var(--ink);
    box-shadow:0 4px 16px rgba(193,122,111,.15);z-index:9999;
    animation:toastpop .3s ease,toastfade .4s ease 1.8s forwards;white-space:nowrap;
  }
  @keyframes toastpop{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes toastfade{to{opacity:0;transform:translateX(-50%) translateY(-8px)}}

  /* Confetti */
  .cp{position:fixed;border-radius:2px;animation:cf linear forwards;pointer-events:none;z-index:9999}
  @keyframes cf{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <span class="header-icon">⭐</span>
    <span class="header-label">Dari Dara, untuk Razan</span>
    <h1 class="header-title">Wishlist <span>Buat Razan</span></h1>
    <p class="header-sub">Tulis semua yang kamu mau Razan lakuin — simpan dulu, kirim kalau udah siap 🤍</p>
  </div>

  <!-- ADD FORM -->
  <div class="add-section">
    <span class="add-label">Tambah Wish Baru</span>

    <div class="category-row" id="cat-row">
      <button class="cat-btn active" data-cat="jalan" onclick="selectCat(this)">🗺️ Jalan-jalan</button>
      <button class="cat-btn" data-cat="makan" onclick="selectCat(this)">🍜 Makan</button>
      <button class="cat-btn" data-cat="quality" onclick="selectCat(this)">🫂 Quality Time</button>
      <button class="cat-btn" data-cat="hadiah" onclick="selectCat(this)">🎁 Hadiah</button>
      <button class="cat-btn" data-cat="lainnya" onclick="selectCat(this)">✨ Lainnya</button>
    </div>

    <textarea class="wish-input" id="wish-input" rows="3"
      placeholder="Contoh: Aku mau diajak ke taman bareng waktu sore..."></textarea>

    <div class="priority-row">
      <span class="priority-label">Prioritas:</span>
      <button class="star-btn active" onclick="setStar(1)">⭐</button>
      <button class="star-btn" onclick="setStar(2)">⭐</button>
      <button class="star-btn" onclick="setStar(3)">⭐</button>
    </div>

    <button class="add-btn" id="add-btn" onclick="addWish()">Tambah ke Wishlist ✨</button>
  </div>

  <!-- LIST -->
  <div class="list-header">
    <span class="list-title">Wishlist kamu</span>
    <span class="list-count"><span id="count">0</span> wish</span>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">Semua</button>
    <button class="filter-btn" data-filter="jalan" onclick="setFilter(this)">🗺️ Jalan</button>
    <button class="filter-btn" data-filter="makan" onclick="setFilter(this)">🍜 Makan</button>
    <button class="filter-btn" data-filter="quality" onclick="setFilter(this)">🫂 Quality</button>
    <button class="filter-btn" data-filter="hadiah" onclick="setFilter(this)">🎁 Hadiah</button>
    <button class="filter-btn" data-filter="lainnya" onclick="setFilter(this)">✨ Lainnya</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter(this)">✅ Selesai</button>
  </div>

  <div class="wish-list" id="wish-list"></div>

  <!-- SEND -->
  <div class="send-section">
    <p class="send-hint">Kalau udah mau Razan tau — kirim wishlist kamu langsung ke WhatsApp dia 💬</p>
    <button class="send-btn" id="send-btn" onclick="sendToWA()">
      <span>📤</span> Kirim ke Razan via WhatsApp
    </button>
  </div>

</div>

<script>
const WA = '6285692740607';
const CAT_META = {
  jalan:   {emoji:'🗺️', label:'Jalan-jalan'},
  makan:   {emoji:'🍜', label:'Makan'},
  quality: {emoji:'🫂', label:'Quality Time'},
  hadiah:  {emoji:'🎁', label:'Hadiah'},
  lainnya: {emoji:'✨', label:'Lainnya'},
};

let wishes = JSON.parse(localStorage.getItem('dara-wishlist') || '[]');
let currentCat = 'jalan';
let currentStars = 1;
let currentFilter = 'all';

function save(){ localStorage.setItem('dara-wishlist', JSON.stringify(wishes)); }

function selectCat(btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
}

function setStar(n){
  currentStars = n;
  document.querySelectorAll('.star-btn').forEach((b,i)=>{
    b.classList.toggle('active', i < n);
  });
}

function addWish(){
  const input = document.getElementById('wish-input');
  const text = input.value.trim();
  if(!text){ shake(input); return; }

  const wish = {
    id: Date.now(),
    text,
    cat: currentCat,
    stars: currentStars,
    done: false,
    date: new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long'})
  };
  wishes.unshift(wish);
  save();
  input.value = '';
  renderList();
  showToast('Wish ditambahkan! ⭐');
  if(wishes.length===1) confetti();
}

function toggleDone(id){
  const w = wishes.find(x=>x.id===id);
  if(w){ w.done=!w.done; save(); renderList(); }
}

function deleteWish(id){
  wishes = wishes.filter(x=>x.id!==id);
  save(); renderList();
  showToast('Wish dihapus.');
}

function setFilter(btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderList();
}

function renderList(){
  const list = document.getElementById('wish-list');
  let filtered = wishes;
  if(currentFilter==='done') filtered = wishes.filter(w=>w.done);
  else if(currentFilter!=='all') filtered = wishes.filter(w=>w.cat===currentFilter);

  document.getElementById('count').textContent = wishes.length;
  document.getElementById('send-btn').disabled = wishes.filter(w=>!w.done).length === 0;

  if(!filtered.length){
    list.innerHTML = `
      <div class="empty">
        <span class="empty-icon">🌸</span>
        <p class="empty-text">${currentFilter==='done'?'Belum ada wish yang selesai':'Belum ada wish di kategori ini.<br>Tulis yang pertama!'}</p>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(w=>{
    const meta = CAT_META[w.cat]||CAT_META.lainnya;
    const stars = '⭐'.repeat(w.stars);
    return `
    <div class="wish-item ${w.done?'done':''}" id="wi-${w.id}">
      <div class="wish-check" onclick="toggleDone(${w.id})">${w.done?'✓':''}</div>
      <div class="wish-body">
        <span class="wish-cat-badge">${meta.emoji} ${meta.label}</span>
        <p class="wish-text">${escHtml(w.text)}</p>
        <span class="wish-stars">${stars}</span>
        <span class="wish-date">${w.date}</span>
      </div>
      <button class="wish-del" onclick="deleteWish(${w.id})">✕</button>
    </div>`;
  }).join('');
}

function sendToWA(){
  const pending = wishes.filter(w=>!w.done);
  if(!pending.length) return;

  // Group by priority
  const byStars = [3,2,1].map(s=>pending.filter(w=>w.stars===s));
  let msg = `SAYANGG🤍 Ini wishlist aku buat kamu:\n\n`;

  byStars.forEach((group,si)=>{
    if(!group.length) return;
    const s = 3-si;
    msg += `${'⭐'.repeat(s)} Prioritas ${['','biasa','penting','utama'][s]}:\n`;
    group.forEach((w,i)=>{
      const meta = CAT_META[w.cat]||CAT_META.lainnya;
      msg += `${i+1}. ${meta.emoji} ${w.text}\n`;
    });
    msg += '\n';
  });

  msg += `Total: ${pending.length} wish yang nunggu ya! 🥺\n`;
  msg += `— Dara 🤍`;

  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`, '_blank');
  showToast('Wishlist dikirim ke Razan! 🤍');
  confetti();
}

function shake(el){
  el.style.borderColor='var(--rose)';
  el.style.animation='none';
  setTimeout(()=>{
    el.style.animation='';
    el.style.borderColor='';
  },300);
  showToast('Tulis dulu wish-nya ya! 😊');
}

function showToast(msg){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function confetti(){
  const colors=['#c17a6f','#e8c4b0','#c9a96e','#b5c4b1','#faf6f0'];
  for(let i=0;i<60;i++) setTimeout(()=>{
    const el=document.createElement('div');el.className='cp';
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2.5}s;animation-delay:${Math.random()*.5}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),5000);
  },i*30);
}

renderList();
</script>
</body>
</html>
