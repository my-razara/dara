<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DNA Hubungan Kita — Razan & Dara 🧬</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#faf6f0;--warm:#f5ede0;--blush:#e8c4b0;
    --rose:#c17a6f;--deep:#7a3f35;--ink:#2d1f1a;
    --gold:#c9a96e;--muted:#9a8070;--sage:#b5c4b1;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:#0d0818;font-family:'Poppins',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}

  /* ── STARFIELD ── */
  #starfield{position:fixed;inset:0;z-index:0;overflow:hidden}
  .star-bg{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) ease-in-out infinite var(--delay)}
  @keyframes twinkle{0%,100%{opacity:var(--min)}50%{opacity:var(--max)}}

  .page{max-width:480px;margin:0 auto;padding:0 1.25rem 5rem;position:relative;z-index:1}

  /* ── HEADER ── */
  .header{text-align:center;padding:2.5rem 0 1.75rem}
  .header-label{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:rgba(201,169,110,.7);display:block;margin-bottom:.5rem}
  .header-title{font-size:clamp(1.4rem,5vw,1.9rem);font-weight:700;color:#fff;margin-bottom:.3rem;text-shadow:0 0 30px rgba(193,122,111,.4)}
  .header-title span{color:var(--gold)}
  .header-sub{font-size:12px;color:rgba(255,255,255,.45);line-height:1.65;max-width:280px;margin:0 auto}

  /* ── DNA CANVAS ── */
  .dna-wrap{
    position:relative;margin:0 auto 1.75rem;
    width:100%;max-width:340px;
    height:clamp(280px,70vw,340px);
  }
  #dna-canvas{width:100%;height:100%;display:block}

  /* ── PERCENTAGE PILLS ── */
  .pills-wrap{
    display:flex;flex-wrap:wrap;gap:.5rem;
    justify-content:center;margin-bottom:1.75rem;
  }
  .pill{
    display:flex;align-items:center;gap:.4rem;
    background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.12);
    border-radius:50px;padding:.35rem .85rem;
    cursor:pointer;transition:all .2s;
    animation:pillfade .5s ease forwards;
    opacity:0;
  }
  @keyframes pillfade{to{opacity:1}}
  .pill:active{transform:scale(.95)}
  .pill.selected{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3)}
  .pill-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .pill-label{font-size:11px;font-weight:500;color:rgba(255,255,255,.8)}
  .pill-pct{font-size:11px;font-weight:700;color:#fff}

  /* ── DETAIL CARD ── */
  .detail-card{
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
    border-radius:20px;padding:1.4rem 1.4rem;
    backdrop-filter:blur(12px);
    margin-bottom:1.75rem;
    display:none;
    animation:popin .35s cubic-bezier(.34,1.3,.64,1);
  }
  .detail-card.show{display:block}
  @keyframes popin{from{transform:scale(.92) translateY(8px);opacity:0}to{transform:none;opacity:1}}

  .detail-top{display:flex;align-items:center;gap:.85rem;margin-bottom:.85rem}
  .detail-icon{
    width:48px;height:48px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:1.5rem;flex-shrink:0;
  }
  .detail-name{font-size:1rem;font-weight:700;color:#fff}
  .detail-pct{font-size:.85rem;color:rgba(255,255,255,.5)}

  .detail-bar-wrap{margin-bottom:.85rem}
  .detail-bar-bg{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
  .detail-bar-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1)}

  .detail-desc{font-size:13px;color:rgba(255,255,255,.65);line-height:1.75}
  .detail-desc em{color:rgba(201,169,110,.9);font-style:normal;font-weight:500}

  /* ── TOTAL ── */
  .total-card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    border-radius:16px;padding:1.1rem 1.25rem;
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:1rem;
  }
  .total-label{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em}
  .total-val{font-size:12px;font-weight:600;color:rgba(255,255,255,.7)}

  /* ── TAP HINT ── */
  .tap-hint{
    text-align:center;font-size:11px;color:rgba(255,255,255,.3);
    animation:blink 2.5s ease-in-out infinite;margin-bottom:.5rem;
  }
  @keyframes blink{0%,100%{opacity:.3}50%{opacity:.7}}

  /* Confetti */
  .cp{position:fixed;border-radius:2px;animation:cf linear forwards;pointer-events:none;z-index:9999}
  @keyframes cf{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div id="starfield"></div>

<div class="page">
  <div class="header">
    <span class="header-label">Komposisi Hubungan Kita</span>
    <h1 class="header-title">DNA <span>Hubungan</span> Kita 🧬</h1>
    <p class="header-sub">Ini semua elemen yang membentuk hubungan Razan & Dara — tap tiap bagian untuk lihat detailnya</p>
  </div>

  <div class="dna-wrap">
    <canvas id="dna-canvas"></canvas>
  </div>

  <p class="tap-hint">👆 Tap salah satu elemen di bawah</p>

  <div class="pills-wrap" id="pills-wrap"></div>

  <div class="detail-card" id="detail-card">
    <div class="detail-top">
      <div class="detail-icon" id="d-icon"></div>
      <div>
        <p class="detail-name" id="d-name"></p>
        <p class="detail-pct" id="d-pct"></p>
      </div>
    </div>
    <div class="detail-bar-wrap">
      <div class="detail-bar-bg">
        <div class="detail-bar-fill" id="d-bar" style="width:0%"></div>
      </div>
    </div>
    <p class="detail-desc" id="d-desc"></p>
  </div>

  <div class="total-card">
    <span class="total-label">Total elemen</span>
    <span class="total-val">12 komponen · 100% kita</span>
  </div>
</div>

<script>
// ── DNA COMPONENTS ──
const DNA = [
  {
    name: "Ketawa Bareng",
    pct: 22,
    emoji: "😂",
    color: "#f4a261",
    desc: "Lebih dari seperlima dari hubungan kita itu ketawa. Entah itu hal random, hal ga penting, atau hal yang sebenernya ga lucu tapi jadi lucu karena kita berdua. Ini bagian favorit aku.",
  },
  {
    name: "Rasa Sayang",
    pct: 18,
    emoji: "🤍",
    color: "#c17a6f",
    desc: "Bukan yang paling kelihatan, tapi yang paling terasa. Ada di tiap pesan, tiap kehadiran, tiap 'kamu udah makan?'. Ini yang ngikat segalanya.",
  },
  {
    name: "Jajan Bareng",
    pct: 12,
    emoji: "🍜",
    color: "#e9c46a",
    desc: "Aku rasa hampir setiap momen berkesan kita ada makanannya. Ini bukan tentang jajannya — ini tentang duduk bareng, pesen bareng, dan nikmatin semuanya bareng.",
  },
  {
    name: "Overthinking",
    pct: 10,
    emoji: "💭",
    color: "#8ecae6",
    desc: "Kita berdua sama-sama suka overthinking. Yang bedain kita adalah kita punya satu sama lain buat nenangin pas overthinking itu datang. Dan itu yang bikin semuanya lebih ringan.",
  },
  {
    name: "Jalan-jalan",
    pct: 9,
    emoji: "🗺️",
    color: "#a8dadc",
    desc: "Dari Ragunan sampai Kota Tua, dari taman biasa sampai tempat random yang kita temuin ga sengaja. Setiap perjalanan bareng selalu jadi kenangan.",
  },
  {
    name: "Deep Talk",
    pct: 8,
    emoji: "🌙",
    color: "#9b72cf",
    desc: "Ada momen-momen dimana kita ngobrol serius — tentang masa depan, tentang perasaan, tentang hal yang jarang dibicarain. Dan di momen itu, aku selalu ngerasa paling kenal kamu.",
  },
  {
    name: "Diam Bareng",
    pct: 7,
    emoji: "🫶",
    color: "#b5c4b1",
    desc: "Ga semua momen butuh kata-kata. Ada waktu dimana kita cuma ada — duduk bareng, ga ngomong, tapi ngerasa nyaman. Ini tanda bahwa kehadiran kamu aja udah cukup.",
  },
  {
    name: "Berantem Kecil",
    pct: 5,
    emoji: "😤",
    color: "#e76f51",
    desc: "Ada. Dan itu normal. Yang penting bukan berantemnya — tapi bahwa kita selalu balik lagi. Setiap berantem kecil justru bikin kita lebih ngerti satu sama lain.",
  },
  {
    name: "Kangen",
    pct: 4,
    emoji: "📱",
    color: "#457b9d",
    desc: "Kangen itu bagian dari kita. Setiap kali jauh, ada sesuatu yang terasa ga lengkap. Dan itu bukan hal yang buruk — itu bukti kalau kehadiran satu sama lain beneran berarti.",
  },
  {
    name: "Dukungan",
    pct: 3,
    emoji: "💪",
    color: "#2a9d8f",
    desc: "Di balik semua yang kita lakuin bareng, ada fondasi saling dukung. Waktu yang satu lagi down, yang lain ada. Ga selalu sempurna, tapi selalu ada usaha.",
  },
  {
    name: "Spontan",
    pct: 1,
    emoji: "⚡",
    color: "#f7b731",
    desc: "Hal-hal kecil yang ga direncanain — tiba-tiba jalan, tiba-tiba makan, tiba-tiba ngobrol sampai malam. Yang paling berkesan sering yang paling ga direncanain.",
  },
  {
    name: "Misteri",
    pct: 1,
    emoji: "🔮",
    color: "#c9a96e",
    desc: "Ada bagian dari hubungan kita yang ga bisa aku jelasin dengan kata-kata. Perasaan yang muncul tanpa alasan jelas. Keyakinan yang ga perlu bukti. Ini bagian yang paling ajaib.",
  },
];

// ── STARFIELD ──
const sf = document.getElementById('starfield');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star-bg';
  const size=Math.random()*1.5+.3;
  const minA=Math.random()*.2+.05;
  const maxA=Math.random()*.5+.3;
  s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;--min:${minA};--max:${maxA}`;
  sf.appendChild(s);
}

// ── DNA ANIMATION ──
const canvas=document.getElementById('dna-canvas');
const ctx=canvas.getContext('2d');
let frame=0;
let W,H;

function resizeCanvas(){
  const wrap=canvas.parentElement;
  W=canvas.width=wrap.offsetWidth;
  H=canvas.height=wrap.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

function drawDNA(){
  ctx.clearRect(0,0,W,H);

  const cx=W/2;
  const segments=40;
  const segH=H/segments;
  const amp=clamp(W*.22,40,80);
  const speed=.018;

  for(let i=0;i<segments;i++){
    const y=i*segH+segH/2;
    const phase=i*(Math.PI*2/segments);
    const wave=Math.sin(phase+frame*speed);

    const x1=cx+amp*wave;
    const x2=cx-amp*wave;

    // Pick color from DNA array based on segment
    const colorIdx=Math.floor((i/segments)*DNA.length);
    const c=hexToRgb(DNA[colorIdx].color);

    const alpha=.6+.4*Math.abs(wave);

    // Left strand dot
    ctx.beginPath();
    ctx.arc(x1,y,3.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(${c},${alpha})`;
    ctx.fill();

    // Right strand dot
    ctx.beginPath();
    ctx.arc(x2,y,3.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(${c},${alpha})`;
    ctx.fill();

    // Crossbar (rung) every ~3 segments
    if(i%3===0){
      const rungAlpha=.15+.25*Math.abs(wave);
      ctx.beginPath();
      ctx.moveTo(x1,y);
      ctx.lineTo(x2,y);
      ctx.strokeStyle=`rgba(${c},${rungAlpha})`;
      ctx.lineWidth=1.5;
      ctx.stroke();

      // Rung center dot
      const cx2=(x1+x2)/2;
      ctx.beginPath();
      ctx.arc(cx2,y,2,0,Math.PI*2);
      ctx.fillStyle=`rgba(${c},${rungAlpha*2})`;
      ctx.fill();
    }
  }

  // Strand lines
  ctx.beginPath();
  for(let i=0;i<segments;i++){
    const y=i*segH+segH/2;
    const wave=Math.sin(i*(Math.PI*2/segments)+frame*speed);
    const x=cx+amp*wave;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  const grad1=ctx.createLinearGradient(0,0,0,H);
  DNA.forEach((d,i)=>{ grad1.addColorStop(i/(DNA.length-1),d.color+'aa'); });
  ctx.strokeStyle=grad1;
  ctx.lineWidth=2;
  ctx.lineJoin='round';
  ctx.stroke();

  ctx.beginPath();
  for(let i=0;i<segments;i++){
    const y=i*segH+segH/2;
    const wave=Math.sin(i*(Math.PI*2/segments)+frame*speed);
    const x=cx-amp*wave;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.strokeStyle=grad1;
  ctx.lineWidth=2;
  ctx.stroke();

  frame++;
  requestAnimationFrame(drawDNA);
}
drawDNA();

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function clamp(v,mn,mx){return Math.min(Math.max(v,mn),mx)}

// ── PILLS ──
let selectedIdx = null;
const pillsWrap=document.getElementById('pills-wrap');

DNA.forEach((d,i)=>{
  const pill=document.createElement('div');
  pill.className='pill';
  pill.style.animationDelay=`${i*.05}s`;
  pill.innerHTML=`
    <div class="pill-dot" style="background:${d.color}"></div>
    <span class="pill-label">${d.emoji} ${d.name}</span>
    <span class="pill-pct">${d.pct}%</span>
  `;
  pill.addEventListener('click',()=>showDetail(i,pill));
  pillsWrap.appendChild(pill);
});

function showDetail(idx, pillEl){
  // Deselect all
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('selected'));
  pillEl.classList.add('selected');

  const d=DNA[idx];
  document.getElementById('d-icon').style.background=d.color+'22';
  document.getElementById('d-icon').textContent=d.emoji;
  document.getElementById('d-name').textContent=d.name;
  document.getElementById('d-pct').textContent=`${d.pct}% dari hubungan kita`;
  document.getElementById('d-desc').innerHTML=d.desc;

  const bar=document.getElementById('d-bar');
  bar.style.background=d.color;
  bar.style.width='0%';
  setTimeout(()=>{ bar.style.width=`${d.pct}%`; },50);

  const card=document.getElementById('detail-card');
  card.classList.remove('show');
  void card.offsetWidth;
  card.classList.add('show');

  card.scrollIntoView({behavior:'smooth',block:'nearest'});

  if(d.pct>=15) confetti();
}

function confetti(){
  const colors=['#c17a6f','#e8c4b0','#c9a96e','#b5c4b1','#f4a261'];
  for(let i=0;i<40;i++) setTimeout(()=>{
    const el=document.createElement('div');el.className='cp';
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.4}s;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),4000);
  },i*25);
}
</script>
</body>
</html>
