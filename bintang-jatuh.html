<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bintang Jatuh — Untuk Dara 🌠</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0a0515;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    cursor: default;
  }

  /* ── SKY CANVAS ── */
  #sky {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* ── HEADER ── */
  .sky-header {
    position: fixed; top: 0; left: 0; right: 0;
    text-align: center;
    padding: 1.75rem 1.5rem 1rem;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(10,5,21,.85) 0%, transparent 100%);
  }
  .sky-label {
    font-size: 10px; letter-spacing: .25em; text-transform: uppercase;
    color: rgba(201,169,110,.7); display: block; margin-bottom: .3rem;
  }
  .sky-title {
    font-size: clamp(1.2rem,5vw,1.6rem);
    font-weight: 700; color: #fff;
    text-shadow: 0 0 20px rgba(180,150,255,.4);
  }
  .sky-title span { color: #c9a96e; }
  .sky-hint {
    font-size: 11px; color: rgba(255,255,255,.4);
    margin-top: .3rem;
    animation: blink 2.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:.8} }

  /* ── COUNTER ── */
  .star-counter {
    position: fixed; top: 1.25rem; right: 1.25rem;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 50px; padding: .3rem .85rem;
    font-size: 11px; color: rgba(255,255,255,.5);
    z-index: 10; backdrop-filter: blur(4px);
  }
  .star-counter span { color: #c9a96e; font-weight: 700; }

  /* ── MESSAGE CARD ── */
  #msg-card {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 20;
    padding: 1rem;
    pointer-events: none;
  }
  #msg-card.show {
    display: block;
    pointer-events: auto;
  }

  .msg-inner {
    max-width: 420px; margin: 0 auto;
    background: rgba(10,5,21,.92);
    border: 1px solid rgba(201,169,110,.25);
    border-radius: 20px 20px 16px 16px;
    padding: 1.4rem 1.5rem 1.25rem;
    backdrop-filter: blur(12px);
    box-shadow: 0 -4px 40px rgba(0,0,0,.4);
    animation: slideup .4s cubic-bezier(.34,1.3,.64,1);
  }
  @keyframes slideup { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }

  .msg-drag { width: 32px; height: 3px; background: rgba(255,255,255,.2); border-radius: 2px; margin: 0 auto .85rem; }
  .msg-star-icon { font-size: 1.75rem; display: block; text-align: center; margin-bottom: .5rem; animation: twinkle 1.5s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
  .msg-num { font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: #c9a96e; display: block; text-align: center; margin-bottom: .6rem; }
  .msg-text { font-size: clamp(13px,3.5vw,15px); color: #fff; line-height: 1.85; text-align: center; font-weight: 300; margin-bottom: .6rem; }
  .msg-sign { font-size: 11px; color: rgba(201,169,110,.7); display: block; text-align: center; margin-bottom: 1rem; }
  .msg-close {
    width: 100%; padding: .75rem; border-radius: 50px; border: 1px solid rgba(201,169,110,.3);
    background: rgba(201,169,110,.1); color: #c9a96e;
    font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .msg-close:active { background: rgba(201,169,110,.2); }

  /* ── ALL DONE ── */
  #done-overlay {
    display: none; position: fixed; inset: 0; z-index: 30;
    background: rgba(10,5,21,.9); backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
    flex-direction: column; text-align: center; padding: 2rem;
  }
  #done-overlay.show { display: flex; }
  .done-emoji { font-size: 4rem; margin-bottom: 1rem; display: block; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .done-title { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: .5rem; }
  .done-title span { color: #c9a96e; }
  .done-sub { font-size: 13px; color: rgba(255,255,255,.5); line-height: 1.75; max-width: 300px; margin: 0 auto 2rem; }
  .done-btn {
    padding: .9rem 2.5rem; border-radius: 50px; border: none; cursor: pointer;
    font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 700;
    background: linear-gradient(135deg,#c17a6f,#c9a96e); color: #fff;
    box-shadow: 0 4px 20px rgba(193,122,111,.4);
  }
  .done-btn:active { opacity: .85; transform: scale(.97); }

  /* ── TAP RIPPLE ── */
  .tap-ripple {
    position: fixed; border-radius: 50%;
    width: 60px; height: 60px;
    border: 1.5px solid rgba(255,255,255,.3);
    transform: translate(-50%,-50%) scale(0);
    animation: ripple .6s ease forwards;
    pointer-events: none; z-index: 5;
  }
  @keyframes ripple { 0%{transform:translate(-50%,-50%) scale(0);opacity:.8} 100%{transform:translate(-50%,-50%) scale(2.5);opacity:0} }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<div class="sky-header">
  <span class="sky-label">Khusus untuk Dara</span>
  <h1 class="sky-title">Bintang <span>Jatuh</span> 🌠</h1>
  <p class="sky-hint">✨ Tap langit untuk memanggil bintang</p>
</div>

<div class="star-counter">
  <span id="star-count">0</span> / 25 bintang
</div>

<!-- Message card -->
<div id="msg-card">
  <div class="msg-inner">
    <div class="msg-drag"></div>
    <span class="msg-star-icon" id="msg-icon">🌟</span>
    <span class="msg-num" id="msg-num">Bintang #1</span>
    <p class="msg-text" id="msg-text">...</p>
    <span class="msg-sign">— Razan 🤍</span>
    <button class="msg-close" onclick="closeMsg()">Tutup & Cari Bintang Lagi ✨</button>
  </div>
</div>

<!-- Done -->
<div id="done-overlay">
  <span class="done-emoji">🌌</span>
  <h2 class="done-title">Semua bintang <span>sudah jatuh</span></h2>
  <p class="done-sub">25 bintang, 25 pesan — semua sudah kamu tangkap. Makasih udah ada di langit aku, Dara. 🤍</p>
  <button class="done-btn" onclick="resetSky()">Hidupkan Lagi Langitnya 🌠</button>
</div>

<script>
const MESSAGES = [
  { icon: "🌟", text: "Kamu itu hal yang aku syukuri setiap hari — bahkan di hari yang berat sekalipun." },
  { icon: "💫", text: "Ada banyak hal di dunia ini yang ga bisa aku kontrol. Tapi rasa sayang aku ke kamu, itu aku jaga." },
  { icon: "✨", text: "Kamu ga harus jadi sempurna. Kamu sudah lebih dari cukup — persis seperti kamu sekarang." },
  { icon: "🌠", text: "Hal yang aku suka dari kamu bukan satu hal besar — tapi ribuan hal kecil yang terus-terusan bikin aku pilih kamu." },
  { icon: "⭐", text: "Kalau langit malam ini punya bintang sebanyak hal yang aku suka dari kamu, langitnya ga akan pernah gelap." },
  { icon: "🌟", text: "Kamu adalah jenis orang yang bikin ruangan terasa lebih hangat cuma dengan hadir di sana." },
  { icon: "💫", text: "Aku ga tau banyak hal di dunia ini. Tapi aku tau aku mau kamu ada di setiap versi hidup aku." },
  { icon: "✨", text: "Waktu aku capek dan ngerasa ga cukup — aku inget ada kamu. Dan entah kenapa itu selalu cukup buat aku lanjut." },
  { icon: "🌠", text: "Matamu itu. Aku ga pernah bisa sepenuhnya jelasin kenapa — tapi selalu bikin aku ngerasa aman." },
  { icon: "⭐", text: "Kalau bisa milih ulang, aku tetap pilih kamu. Di semua kemungkinan yang ada, jawabannya tetap kamu." },
  { icon: "🌟", text: "Kamu yang pertama aku mau kabarin waktu sesuatu yang baik terjadi. Dan kamu yang pertama aku cari waktu sesuatu yang buruk terjadi." },
  { icon: "💫", text: "Ada sesuatu dari cara kamu ketawa yang bikin aku lupa semua hal yang lagi aku khawatirkan." },
  { icon: "✨", text: "Kamu punya ketenangan yang jarang aku temuin di tempat lain. Dan itu salah satu hal yang paling aku syukuri dari kamu." },
  { icon: "🌠", text: "Aku perhatiin banyak hal kecil dari kamu. Dan semakin aku perhatiin, semakin aku sadar — kamu luar biasa." },
  { icon: "⭐", text: "Semua hal yang aku lakuin punya rasa yang lebih ringan karena ada kamu. Bukan karena kamu yang bantu — tapi karena kamu ada." },
  { icon: "🌟", text: "Kamu adalah orang yang bikin aku percaya bahwa hal-hal baik memang ada dan memang bisa bertahan." },
  { icon: "💫", text: "Setiap momen sama kamu aku simpan baik-baik. Karena aku tau — momen itu ga akan datang dua kali." },
  { icon: "✨", text: "Kamu ga sadar betapa banyak yang kamu kasih ke aku — ketenangan, semangat, dan alasan untuk jadi lebih baik." },
  { icon: "🌠", text: "Aku selalu berharap kamu bisa lihat diri kamu dari sudut pandang aku. Karena yang aku lihat itu indah banget." },
  { icon: "⭐", text: "Di antara semua hal yang datang dan pergi — kamu yang aku mau tetap ada. Selamanya kalau bisa." },
  { icon: "🌟", text: "Cara kamu hadir itu beda. Ga banyak orang yang bisa bikin orang lain ngerasa se-dihargai itu." },
  { icon: "💫", text: "Kamu itu bukan Plan B. Kamu itu satu-satunya yang aku rencanakan." },
  { icon: "✨", text: "Makasih udah ada. Makasih udah mau. Makasih udah jadi kamu yang sekarang." },
  { icon: "🌠", text: "Langit malam ini cantik. Tapi ga lebih cantik dari kamu waktu kamu senyum beneran." },
  { icon: "⭐", text: "Dari sekian banyak hal yang aku harapin di hidup aku — kamu adalah salah satu yang sudah terjawab. 🤍" },
];

// State
let remaining = [...Array(MESSAGES.length).keys()].sort(() => Math.random() - .5);
let revealed = 0;
let msgOpen = false;

// Canvas setup
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  drawStaticStars();
}

// Static background stars
const bgStars = [];
function initBgStars() {
  bgStars.length = 0;
  for (let i = 0; i < 180; i++) {
    bgStars.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.2 + .2,
      alpha: Math.random() * .6 + .2,
      twinkleSpeed: Math.random() * .02 + .005,
      twinkleOffset: Math.random() * Math.PI * 2,
    });
  }
}

// Shooting stars (animated)
const shooters = [];

// Particles (sparkle on tap)
const particles = [];

let frame = 0;

function drawStaticStars() {
  ctx.clearRect(0, 0, W, H);

  // Deep sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#04011a');
  grad.addColorStop(.5, '#080220');
  grad.addColorStop(1, '#0d0525');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Nebula glow
  const neb1 = ctx.createRadialGradient(W * .25, H * .3, 0, W * .25, H * .3, W * .35);
  neb1.addColorStop(0, 'rgba(80,40,120,.12)');
  neb1.addColorStop(1, 'transparent');
  ctx.fillStyle = neb1;
  ctx.fillRect(0, 0, W, H);

  const neb2 = ctx.createRadialGradient(W * .75, H * .6, 0, W * .75, H * .6, W * .3);
  neb2.addColorStop(0, 'rgba(40,80,120,.1)');
  neb2.addColorStop(1, 'transparent');
  ctx.fillStyle = neb2;
  ctx.fillRect(0, 0, W, H);
}

function animate() {
  requestAnimationFrame(animate);
  frame++;

  drawStaticStars();

  // Draw bg stars with twinkling
  bgStars.forEach(s => {
    const alpha = s.alpha + Math.sin(frame * s.twinkleSpeed + s.twinkleOffset) * .15;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${Math.max(0, Math.min(1, alpha))})`;
    ctx.fill();
  });

  // Shooting stars
  for (let i = shooters.length - 1; i >= 0; i--) {
    const s = shooters[i];
    s.x += s.vx;
    s.y += s.vy;
    s.life -= s.decay;
    s.trail.push({ x: s.x, y: s.y });
    if (s.trail.length > 22) s.trail.shift();

    if (s.life <= 0) {
      // Burst at end
      if (!s.burst) {
        s.burst = true;
        spawnBurst(s.x, s.y, s.color);
        if (s.onEnd) s.onEnd(s.x, s.y);
      }
      shooters.splice(i, 1);
      continue;
    }

    // Trail
    for (let j = 1; j < s.trail.length; j++) {
      const prog = j / s.trail.length;
      ctx.beginPath();
      ctx.moveTo(s.trail[j - 1].x, s.trail[j - 1].y);
      ctx.lineTo(s.trail[j].x, s.trail[j].y);
      ctx.strokeStyle = `rgba(${s.color},${prog * s.life * .9})`;
      ctx.lineWidth = prog * 2.5;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // Head glow
    const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 6);
    grd.addColorStop(0, `rgba(${s.color},${s.life})`);
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(s.x, s.y, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += .04;
    p.life -= .025;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.color},${p.life})`;
    ctx.fill();
  }
}

function spawnBurst(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    const speed = Math.random() * 2.5 + .5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      r: Math.random() * 2 + 1,
      life: Math.random() * .5 + .5,
      color,
    });
  }
}

function launchShooter(fromX, fromY, onEnd) {
  // Shoot diagonally downward from tap point upward
  const angle = (Math.random() * 60 + 200) * Math.PI / 180; // roughly down-right
  const speed = Math.random() * 3 + 4;

  // Start from top area, travel toward tap
  const startX = fromX + (Math.random() - .5) * 120;
  const startY = fromY - Math.random() * 200 - 100;

  const dx = fromX - startX;
  const dy = fromY - startY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const nx = dx / dist, ny = dy / dist;

  const colors = ['255,255,255', '255,240,180', '200,180,255', '180,220,255', '255,200,180'];
  const color = colors[Math.floor(Math.random() * colors.length)];

  shooters.push({
    x: startX, y: startY,
    vx: nx * speed, vy: ny * speed,
    life: 1, decay: .018,
    trail: [],
    color,
    burst: false,
    onEnd,
  });
}

// Tap handler
canvas.addEventListener('click', e => {
  if (msgOpen) return;
  if (remaining.length === 0) {
    document.getElementById('done-overlay').classList.add('show');
    return;
  }

  const x = e.clientX, y = e.clientY;

  // Ripple
  const ripple = document.createElement('div');
  ripple.className = 'tap-ripple';
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);

  // Launch 1-3 shooters, last one triggers message
  const count = Math.floor(Math.random() * 2) + 1;
  for (let i = 0; i < count; i++) {
    const isLast = i === count - 1;
    launchShooter(x, y, isLast ? () => {
      showMessage(x, y);
    } : null);
  }
});

function showMessage(x, y) {
  if (!remaining.length) return;
  msgOpen = true;

  const idx = remaining.pop();
  revealed++;

  const msg = MESSAGES[idx];
  document.getElementById('msg-icon').textContent = msg.icon;
  document.getElementById('msg-num').textContent = `Bintang #${revealed}`;
  document.getElementById('msg-text').textContent = msg.text;
  document.getElementById('star-count').textContent = revealed;

  document.getElementById('msg-card').classList.add('show');
}

function closeMsg() {
  document.getElementById('msg-card').classList.remove('show');
  msgOpen = false;
  if (remaining.length === 0) {
    setTimeout(() => {
      document.getElementById('done-overlay').classList.add('show');
    }, 500);
  }
}

function resetSky() {
  remaining = [...Array(MESSAGES.length).keys()].sort(() => Math.random() - .5);
  revealed = 0;
  document.getElementById('star-count').textContent = '0';
  document.getElementById('done-overlay').classList.remove('show');
  document.getElementById('msg-card').classList.remove('show');
  msgOpen = false;
}

// Init
window.addEventListener('resize', resize);
initBgStars();
resize();
animate();
</script>
</body>
</html>
