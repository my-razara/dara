<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Spin the Wheel — Razan & Dara 🎡</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0;
    --warm: #f5ede0;
    --blush: #e8c4b0;
    --rose: #c17a6f;
    --deep: #7a3f35;
    --ink: #2d1f1a;
    --gold: #c9a96e;
    --muted: #9a8070;
    --sage: #b5c4b1;
    --navy: #2d3f5f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--cream);
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(232,196,176,0.3) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(193,122,111,0.15) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .page { max-width: 480px; margin: 0 auto; padding: 0 1.25rem 4rem; position: relative; z-index: 1; }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── INTRO ── */
  #screen-intro { text-align: center; padding: 3rem 0 2rem; }
  .intro-emoji { font-size: 3.5rem; display: block; margin-bottom: 1.25rem; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .intro-label { font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: .5rem; }
  .intro-title { font-size: clamp(1.5rem,6vw,2rem); font-weight: 700; color: var(--ink); margin-bottom: .4rem; }
  .intro-title span { color: var(--rose); }
  .intro-sub { font-size: 13px; color: var(--muted); line-height: 1.7; max-width: 320px; margin: .5rem auto 2rem; }

  .segment-pills { display: flex; flex-wrap: wrap; gap: .5rem; justify-content: center; margin-bottom: 2rem; }
  .pill {
    display: flex; align-items: center; gap: .3rem;
    background: #fff; border: 1.5px solid var(--blush);
    border-radius: 50px; padding: .35rem .85rem;
    font-size: 12px; font-weight: 500; color: var(--muted);
  }
  .pill-dot { width: 8px; height: 8px; border-radius: 50%; }

  .start-btn {
    width: 100%; padding: .95rem; border-radius: 50px; border: none; cursor: pointer;
    font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700;
    background: var(--rose); color: #fff;
    box-shadow: 0 4px 18px rgba(193,122,111,.4); transition: all .2s;
  }
  .start-btn:active { transform: scale(.97); background: var(--deep); }

  /* ── GAME ── */
  #screen-game { padding-top: 1.5rem; }

  .game-header { text-align: center; margin-bottom: 1.25rem; }
  .game-label { font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: .25rem; }
  .game-title { font-size: 1.2rem; font-weight: 700; color: var(--ink); }
  .game-title span { color: var(--rose); }
  .spin-count { font-size: 11px; color: var(--muted); margin-top: .2rem; display: block; }

  /* Wheel */
  .wheel-container {
    position: relative;
    width: clamp(260px, 75vw, 320px);
    height: clamp(260px, 75vw, 320px);
    margin: 0 auto 1rem;
  }

  .wheel-pointer {
    position: absolute; top: -16px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 26px solid var(--deep);
    z-index: 10;
    filter: drop-shadow(0 2px 4px rgba(45,31,26,.3));
  }

  canvas#wheel {
    border-radius: 50%;
    box-shadow: 0 8px 40px rgba(45,31,26,.15), 0 2px 8px rgba(45,31,26,.08);
    display: block; width: 100%; height: 100%;
  }

  .wheel-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 48px; height: 48px; border-radius: 50%;
    background: #fff; border: 3px solid var(--cream);
    box-shadow: 0 2px 12px rgba(45,31,26,.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; z-index: 10; pointer-events: none;
  }

  .spin-btn {
    display: block; width: 100%;
    padding: 1rem; border-radius: 50px; border: none; cursor: pointer;
    font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700;
    background: var(--rose); color: #fff;
    box-shadow: 0 4px 20px rgba(193,122,111,.4);
    transition: all .2s; margin-bottom: 1.25rem;
    letter-spacing: .04em;
  }
  .spin-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
  .spin-btn:not(:disabled):active { transform: scale(.97); background: var(--deep); }

  /* Result sheet */
  #result-sheet {
    display: none;
    background: #fff;
    border: 1.5px solid rgba(193,122,111,.2);
    border-radius: 20px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    box-shadow: 0 4px 24px rgba(193,122,111,.1);
    animation: popin .4s cubic-bezier(.34,1.3,.64,1);
    position: relative; overflow: hidden;
  }
  #result-sheet.show { display: block; }
  #result-sheet::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at top, rgba(232,196,176,.12), transparent 60%);
    pointer-events: none;
  }
  @keyframes popin { from{transform:scale(.88) translateY(10px);opacity:0} to{transform:none;opacity:1} }

  .result-category {
    display: inline-flex; align-items: center; gap: .35rem;
    border-radius: 50px; padding: .3rem .85rem;
    font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    margin-bottom: .85rem;
  }
  .cat-truth { background: rgba(45,63,95,.1); color: var(--navy); border: 1px solid rgba(45,63,95,.2); }
  .cat-dare { background: rgba(193,122,111,.12); color: var(--rose); border: 1px solid rgba(193,122,111,.3); }
  .cat-challenge { background: rgba(201,169,110,.12); color: #8a6a20; border: 1px solid rgba(201,169,110,.3); }
  .cat-hot { background: rgba(180,60,60,.1); color: #9a2020; border: 1px solid rgba(180,60,60,.2); }

  .result-text {
    font-size: clamp(14px,4vw,16px); font-weight: 500;
    color: var(--ink); line-height: 1.7;
    position: relative; z-index: 1;
  }

  .spin-again-btn {
    display: block; width: 100%;
    padding: .85rem; border-radius: 50px; border: 1.5px solid var(--blush);
    background: transparent; color: var(--muted);
    font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .2s;
  }
  .spin-again-btn:active { background: var(--warm); }

  /* History */
  .history-section { margin-top: 1.25rem; }
  .history-title {
    font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--gold); margin-bottom: .6rem;
    display: flex; align-items: center; gap: .5rem;
  }
  .history-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--blush), transparent); }
  .history-list { display: flex; flex-direction: column; gap: .4rem; }
  .history-item {
    display: flex; gap: .6rem; align-items: flex-start;
    font-size: 11px; color: var(--muted); line-height: 1.5;
    padding: .4rem 0; border-bottom: 1px solid rgba(193,122,111,.06);
  }
  .history-item:last-child { border: none; }
  .history-cat { flex-shrink: 0; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 50px; }
  .hcat-truth { background: rgba(45,63,95,.1); color: var(--navy); }
  .hcat-dare { background: rgba(193,122,111,.12); color: var(--rose); }
  .hcat-challenge { background: rgba(201,169,110,.12); color: #8a6a20; }
  .hcat-hot { background: rgba(180,60,60,.1); color: #9a2020; }

  /* Confetti */
  .cp { position: fixed; border-radius: 2px; animation: cf linear forwards; pointer-events: none; z-index: 9999; }
  @keyframes cf { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>
<div class="page">

  <!-- INTRO -->
  <div id="screen-intro" class="screen active">
    <span class="intro-emoji">🎡</span>
    <span class="intro-label">Game Seru Buat Kalian</span>
    <h1 class="intro-title">Spin the <span>Wheel</span></h1>
    <p class="intro-sub">Putar roda, dapat tantangan atau pertanyaan random tentang kalian. Semua extreme, semua seru, semua harus dilakuin — ga ada yang boleh skip 😏</p>

    <div class="segment-pills">
      <div class="pill"><div class="pill-dot" style="background:#2d3f5f"></div> Truth</div>
      <div class="pill"><div class="pill-dot" style="background:#c17a6f"></div> Dare</div>
      <div class="pill"><div class="pill-dot" style="background:#c9a96e"></div> Challenge</div>
      <div class="pill"><div class="pill-dot" style="background:#9a2020"></div> Hot Seat 🔥</div>
    </div>

    <button class="start-btn" onclick="showScreen('screen-game')">Putar Sekarang! 🎡</button>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <span class="game-label">Spin the Wheel</span>
      <h2 class="game-title">Razan <span>&</span> Dara</h2>
      <span class="spin-count" id="spin-count">Sudah putar: 0 kali</span>
    </div>

    <div class="wheel-container">
      <div class="wheel-pointer"></div>
      <canvas id="wheel" width="320" height="320"></canvas>
      <div class="wheel-center">🎡</div>
    </div>

    <button class="spin-btn" id="spin-btn" onclick="spinWheel()">Putar Roda! 🎡</button>

    <div id="result-sheet">
      <div class="result-category" id="result-cat">Truth</div>
      <p class="result-text" id="result-text">...</p>
    </div>

    <button class="spin-again-btn" id="spin-again" style="display:none" onclick="spinWheel()">Putar Lagi →</button>

    <div class="history-section" id="history-section" style="display:none">
      <p class="history-title">Riwayat putaran</p>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>

</div>

<script>
const SEGMENTS = [
  { label: 'Truth', color: '#2d3f5f', catClass: 'cat-truth', hClass: 'hcat-truth' },
  { label: 'Dare', color: '#c17a6f', catClass: 'cat-dare', hClass: 'hcat-dare' },
  { label: 'Challenge', color: '#c9a96e', catClass: 'cat-challenge', hClass: 'hcat-challenge' },
  { label: 'Hot Seat 🔥', color: '#9a3030', catClass: 'cat-hot', hClass: 'hcat-hot' },
  { label: 'Truth', color: '#3d5070', catClass: 'cat-truth', hClass: 'hcat-truth' },
  { label: 'Dare', color: '#b5706a', catClass: 'cat-dare', hClass: 'hcat-dare' },
  { label: 'Challenge', color: '#b5946a', catClass: 'cat-challenge', hClass: 'hcat-challenge' },
  { label: 'Hot Seat 🔥', color: '#7a2020', catClass: 'cat-hot', hClass: 'hcat-hot' },
];

const CARDS = {
  truth: [
    "Kalau kalian berdua harus jelasin hubungan ini ke orang asing dalam 3 kata — kamu pilih kata apa?",
    "Apa hal yang paling sering kamu pikirin waktu lagi sendiri tapi ga pernah kamu omongin ke pasanganmu?",
    "Jujur — ada ga momen dimana kamu ngerasa pasanganmu lebih butuh kamu daripada kamu butuh dia? Atau sebaliknya?",
    "Satu kebiasaan kecil pasanganmu yang tanpa dia tau, selalu bikin kamu senyum sendiri.",
    "Kalau kamu bisa kirim satu pesan ke diri kamu sendiri di hari pertama kenal pasanganmu — apa yang kamu tulis?",
    "Ceritain satu hal yang kamu lakuin buat pasanganmu yang dia ga pernah tau — dan belum pernah kamu ceritain.",
    "Momen apa yang bikin kamu paling ngerasa 'ini orang beda dari yang lain'?",
    "Apa yang bakal kamu kangen paling duluan kalau tiba-tiba kalian harus berjauhan?",
    "Pernah ga kamu ngerasa cinta tapi juga takut dalam waktu bersamaan? Waktu itu situasinya gimana?",
    "Sebutin satu hal dari diri kamu yang kamu harap pasanganmu tau — tanpa harus kamu bilang.",
    "Apa yang bikin kamu yakin pasanganmu beneran tulus — bukan karena kata-katanya tapi dari hal konkret?",
    "Kalau hubungan kalian adalah sebuah lagu, lagu apa yang paling cocok dan kenapa?",
    "Jujur — ada ga ekspektasi yang kamu punya ke pasanganmu yang belum pernah kamu omongin langsung?",
    "Apa versi terbaik dari hubungan kalian yang pengen kamu lihat 2 tahun ke depan?",
    "Ceritain satu momen kecil yang kelihatannya biasa aja tapi sebenernya berkesan banget buat kamu.",
  ],
  dare: [
    "Ganti caption foto profil pasanganmu di hp kamu jadi nama panggilan yang belum pernah kamu pake — tunjukin ke dia.",
    "Ambil satu benda di sekitar kalian sekarang dan jadiin 'hadiah' buat pasanganmu — kasih langsung dengan serius.",
    "Berdiri di depan pasanganmu, tangan di dada, dan pidato singkat 30 detik tentang kenapa kamu sayang dia.",
    "Minta pasanganmu pilih 3 emoji yang menggambarin kamu — kamu harus terima hasilnya tanpa protes.",
    "Tutup mata, pasanganmu taruh sesuatu di tanganmu — tebak bendanya dalam 10 detik pakai sentuhan aja.",
    "Nyanyiin chorus lagu yang bikin kamu inget pasanganmu — sekarang, di depan dia, tanpa malu.",
    "Ambil hp pasanganmu dan set alarm buat dia besok pagi — isi labelnya dengan sesuatu yang manis.",
    "Berdiri, pegangan tangan, dan kalian berdua harus jalan mundur 10 langkah bareng tanpa nabrak apapun.",
    "Pasanganmu foto kamu dari angle terburuk yang dia mau — dan itu jadi foto kontak kamu di hp dia.",
    "Ceritain ke pasanganmu memori pertama kamu bareng dia yang paling kamu inget — dengan mata tertutup.",
    "Rekam video 15 detik: kamu bilang satu alasan kenapa kamu pilih dia. Ga boleh dihapus sampai besok.",
    "Gambarin ekspresi wajah pasanganmu waktu dia seneng di udara pakai jari — dia harus nebak itu ekspresi apa.",
    "Kamu harus duduk persis di sebelah pasanganmu selama 5 menit ke depan — nempel, ga boleh minggir.",
    "Bilang satu compliment ke pasanganmu yang belum pernah kamu bilang sebelumnya — serius, bukan receh.",
    "Pasanganmu pilih satu topik, kamu harus ngomong soal itu tanpa berhenti selama 45 detik penuh.",
  ],
  challenge: [
    "Kalian berdua harus bikin handshake khusus kalian sendiri dalam 2 menit — dan harus dipake setiap ketemu.",
    "Satu orang describe sebuah emosi pakai gerakan tubuh aja — yang lain nebak. Gantian 3 ronde.",
    "Kalian harus scroll galeri masing-masing 1 menit, pilih satu foto yang paling mau disembunyiin — dan harus ceritain konteksnya.",
    "Tebak-tebakan: satu orang pikirin seseorang yang dikenal berdua, yang lain tanya maksimal 10 pertanyaan yes/no.",
    "Kalian harus nulis satu kata yang menggambarin perasaan kalian sekarang di telapak tangan masing-masing — tunjukin barengan.",
    "Satu orang kasih instruksi gerak (angkat tangan, tutup mata, dll), yang lain harus langsung nurut tanpa nanya. 5 instruksi.",
    "Kalian berdua foto selfie dengan ekspresi yang sama persis — harus benar-benar mirip, boleh coba 3 kali.",
    "Siapapun yang lebih dulu ketawa setelah satu orang bilang lelucon garing — harus putar roda lagi.",
    "Kalian gantian sebut nama masing-masing dengan nada dan logat yang beda setiap giliran — 5 ronde, ga boleh diulang.",
    "Satu orang atur posisi tangan yang lain jadi bentuk tertentu — yang diatur harus tebak bentuk apa itu.",
    "Kalian berdua harus minta foto sama-sama ke orang pertama yang lewat atau ada di dekat kalian.",
    "Siapapun yang lebih banyak tahu fakta tentang pasangannya menang — 5 pertanyaan bergantian, skor dijumlah.",
  ],
  hot: [
    "Ambil tangan pasanganmu, tatap matanya, dan bilang satu hal yang selama ini kamu takut dia tau tentang kamu.",
    "Apa yang bikin kamu paling insecure dalam hubungan ini — bukan soal orang lain, tapi soal diri kamu sendiri?",
    "Kalau kamu harus jujur soal satu hal yang masih sering bikin kamu ragu dalam hubungan ini — apa itu?",
    "Ceritain ke pasanganmu: ada ga momen dimana kamu ngerasa ga cukup buat dia? Waktu itu situasinya gimana?",
    "Apa yang paling kamu harapin pasanganmu lakuin tapi belum pernah kamu minta secara langsung?",
    "Pegang tangan pasanganmu dan jawab jujur: seberapa sering kamu ngerasa kesepian meski lagi sama dia?",
    "Ceritain satu keputusan dalam hubungan ini yang sampai sekarang masih kamu pertanyain sendiri.",
    "Kalau pasanganmu bisa tau satu hal yang kamu pikirin tentang masa depan kalian sekarang — apa yang mau kamu kasih tau?",
    "Apa yang bikin kamu paling takut kehilangan dari pasanganmu — bukan orangnya secara umum, tapi hal spesifik?",
    "Tatap mata pasanganmu dan bilang: apa yang dia berikan ke kamu yang ga pernah kamu dapet dari orang lain sebelumnya?",
    "Ceritain satu hal yang kamu lakuin sendirian — kebiasaan, ritual, apapun — yang kamu harap suatu hari bisa kamu lakuin bareng dia.",
    "Pegang tangan pasanganmu, tutup mata sejenak, terus bilang satu hal yang kamu yakini tentang masa depan kalian.",
  ]
};

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const SIZE = 320;
const CX = SIZE/2, CY = SIZE/2, R = SIZE/2 - 4;
let angle = 0;
let isSpinning = false;
let spinCount = 0;
let history = [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
  if (id === 'screen-game') drawWheel(angle);
}

function drawWheel(a) {
  ctx.clearRect(0, 0, SIZE, SIZE);
  const n = SEGMENTS.length;
  const arc = (2 * Math.PI) / n;

  SEGMENTS.forEach((seg, i) => {
    const start = a + i * arc;
    const end = start + arc;

    // Slice
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.font = `600 ${clamp(11, 3, 13)}px Poppins, sans-serif`;
    ctx.fillText(seg.label, R - 14, 4);
    ctx.restore();
  });

  // Outer ring
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(45,31,26,0.12)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Center
  ctx.beginPath();
  ctx.arc(CX, CY, 24, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = 'rgba(193,122,111,0.2)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function clamp(val, min, max) { return Math.min(Math.max(val, min), max); }

function spinWheel() {
  if (isSpinning) return;
  isSpinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('spin-again').style.display = 'none';
  document.getElementById('result-sheet').classList.remove('show');

  const extraSpins = (6 + Math.random() * 6) * 2 * Math.PI;
  const target = Math.random() * 2 * Math.PI;
  const total = extraSpins + target;
  const duration = 3800 + Math.random() * 1000;
  const startAngle = angle;
  const startTime = performance.now();

  function ease(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    angle = startAngle + total * ease(progress);
    drawWheel(angle);
    if (progress < 1) requestAnimationFrame(animate);
    else {
      angle = angle % (2 * Math.PI);
      isSpinning = false;
      showResult();
    }
  }
  requestAnimationFrame(animate);
}

function showResult() {
  // Determine which segment the pointer (top = 3π/2) lands on
  const n = SEGMENTS.length;
  const arc = (2 * Math.PI) / n;
  const ptr = (3 * Math.PI / 2);
  const norm = ((ptr - angle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const idx = Math.floor(norm / arc) % n;
  const seg = SEGMENTS[idx];

  // Pick random card from category
  const catKey = seg.label.includes('Hot') ? 'hot'
    : seg.label === 'Dare' ? 'dare'
    : seg.label === 'Challenge' ? 'challenge'
    : 'truth';

  const pool = CARDS[catKey];
  const text = pool[Math.floor(Math.random() * pool.length)];

  // Update UI
  const catEl = document.getElementById('result-cat');
  catEl.className = `result-category ${seg.catClass}`;
  catEl.textContent = seg.label;
  document.getElementById('result-text').textContent = text;
  document.getElementById('result-sheet').classList.add('show');

  spinCount++;
  document.getElementById('spin-count').textContent = `Sudah putar: ${spinCount} kali`;
  document.getElementById('spin-btn').disabled = false;
  document.getElementById('spin-again').style.display = 'block';

  // Add to history
  history.unshift({ cat: seg.label, catClass: seg.hClass, text });
  renderHistory();

  if (catKey === 'hot') confetti();

  document.getElementById('result-sheet').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderHistory() {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  if (history.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = history.slice(0, 8).map(h =>
    `<div class="history-item">
      <span class="history-cat ${h.catClass}">${h.cat}</span>
      <span>${h.text.substring(0, 70)}${h.text.length > 70 ? '...' : ''}</span>
    </div>`
  ).join('');
}

function confetti() {
  const colors = ['#c17a6f','#e8c4b0','#c9a96e','#b5c4b1','#9a3030'];
  for (let i = 0; i < 60; i++) setTimeout(() => {
    const el = document.createElement('div'); el.className = 'cp';
    el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2.5}s;animation-delay:${Math.random()*.5}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(el); setTimeout(() => el.remove(), 5000);
  }, i * 30);
}

// Init
drawWheel(angle);
</script>
</body>
